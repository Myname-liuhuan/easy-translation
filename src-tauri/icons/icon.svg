<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect x="50" y="50" width="400" height="400" rx="72" fill="#1565C0"/>

  <!-- Main speech bubble (left, white) -->
  <rect x="90" y="110" width="200" height="140" rx="22" fill="#ffffff"/>
  <!-- bubble tail pointing bottom-left -->
  <polygon points="108,250 90,285 145,250" fill="#ffffff"/>

  <!-- Secondary speech bubble (right, lighter blue) -->
  <rect x="210" y="250" width="200" height="140" rx="22" fill="#90CAF9"/>
  <!-- bubble tail pointing bottom-right -->
  <polygon points="392,390 410,425 355,390" fill="#90CAF9"/>

  <!-- Translation arrows between bubbles -->
  <path d="M230 238 Q250 218 270 238" fill="none" stroke="#1565C0" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M270 252 Q250 272 230 252" fill="none" stroke="#1565C0" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Text lines in left bubble -->
  <rect x="110" y="140" width="80" height="11" rx="5.5" fill="#1565C0" opacity="0.3"/>
  <rect x="110" y="162" width="128" height="11" rx="5.5" fill="#1565C0" opacity="0.3"/>
  <rect x="110" y="184" width="64" height="11" rx="5.5" fill="#1565C0" opacity="0.3"/>
  <rect x="110" y="206" width="104" height="11" rx="5.5" fill="#1565C0" opacity="0.2"/>

  <!-- Text lines in right bubble -->
  <rect x="230" y="278" width="128" height="11" rx="5.5" fill="#1565C0" opacity="0.4"/>
  <rect x="230" y="300" width="80" height="11" rx="5.5" fill="#1565C0" opacity="0.4"/>
  <rect x="230" y="322" width="108" height="11" rx="5.5" fill="#1565C0" opacity="0.3"/>
  <rect x="230" y="344" width="64" height="11" rx="5.5" fill="#1565C0" opacity="0.25"/>
</svg>
